<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellitas en Busca de Hogar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Huellitas de Amor</h1>
        <p>Encuentra a tu compañero ideal</p>
    </header>

    <main class="contenedor">
        <article class="tarjeta">
            <div class="imagen-box">
                <img src="gatito.jpeg" alt="Gatito en adopción">
                <span class="badge">Macho</span>
            </div>
            <div class="info">
                <h2>Pequeño Gris</h2>
                <p class="descripcion">
                    Este tierno gatito de ojos azules está buscando un hogar lleno de amor. 
                    Es muy juguetón, curioso y le encanta explorar.
                </p>
                <div class="detalles">
                    <span>🐾 Juguetón</span>
                    <span>🐾 Cariñoso</span>
                </div>
                <a href="#" class="btn-adopcion">¡Adoptar ahora!</a>
            </div>
        </article>
    </main>

</body>
</html>
